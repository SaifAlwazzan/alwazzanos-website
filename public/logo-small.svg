<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 120" width="260" height="120">
  <defs>
    <linearGradient id="cs" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#0088FF"/>
    </linearGradient>
    <linearGradient id="ws" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#D0D8E0"/>
    </linearGradient>
    <linearGradient id="fl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#00D4FF;stop-opacity:0.8"/>
      <stop offset="80%" style="stop-color:#0088FF;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#0088FF;stop-opacity:0"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark gray background -->
  <rect width="260" height="120" rx="8" fill="#1A1E26"/>

  <text x="130" y="48" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="200" fill="url(#ws)" letter-spacing="6">
    ALWAZZAN
  </text>

  <rect x="22" y="56" width="216" height="1.2" rx="0.6" fill="url(#fl)" filter="url(#gl)"/>

  <g filter="url(#gl)">
    <text x="130" y="80" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="17" font-weight="700" fill="url(#cs)" letter-spacing="10">
      OS
    </text>
  </g>

  <text x="130" y="100" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="5" font-weight="300" fill="#4A6070" letter-spacing="3">
    OPERATING SYSTEMS
  </text>
</svg>
